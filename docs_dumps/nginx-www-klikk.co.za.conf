# Reverse proxy for www.klikk.co.za
# Serves: portal (SPA) at / and Django API at /backend
# Place in /etc/nginx/sites-available/klikk.co.za and symlink from sites-enabled.
# SSL: certbot --nginx -d www.klikk.co.za -d klikk.co.za (or use the Caddy option below)

server {
    listen 80;
    server_name www.klikk.co.za klikk.co.za;

    # Optional: redirect to HTTPS (uncomment after SSL is in place)
    # return 301 https://$host$request_uri;
    # }
    # server {
    # listen 443 ssl http2;
    # server_name www.klikk.co.za klikk.co.za;
    # ssl_certificate     /etc/letsencrypt/live/www.klikk.co.za/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.klikk.co.za/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Django backend: /backend/* -> localhost:8001 (prefix stripped so Django sees /api/..., /xero/...)
    location /backend/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Portal (Quasar SPA): everything else -> localhost:8080
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
