# Reverse proxy for www.klikk.co.za (HTTP + HTTPS)
# Copy this entire file to the server: sudo cp klikk.co.za-fixed.conf /etc/nginx/sites-available/klikk.co.za
# Then: sudo nginx -t && sudo systemctl reload nginx

# HTTP
server {
    listen 80;
    server_name www.klikk.co.za klikk.co.za;
    # return 301 https://$host$request_uri;   # uncomment to force HTTPS

    location /backend/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS – must be present so www.klikk.co.za on 443 is not handled by paw
server {
    listen 443 ssl http2;
    server_name www.klikk.co.za klikk.co.za;
    ssl_certificate     /etc/letsencrypt/live/www.klikk.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.klikk.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /backend/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
