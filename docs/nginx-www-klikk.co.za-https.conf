# Reverse proxy for www.klikk.co.za (HTTP + HTTPS)
# 1) Copy to /etc/nginx/sites-available/klikk.co.za and enable the site.
# 2) Run: sudo certbot --nginx -d www.klikk.co.za -d klikk.co.za
#    Certbot will add SSL and redirect HTTP→HTTPS automatically.
# 3) If you prefer to manage SSL yourself, uncomment the ssl_certificate lines
#    and the HTTPS server block below, then reload nginx.

# HTTP – redirect to HTTPS (enable after certbot has run)
server {
    listen 80;
    server_name www.klikk.co.za klikk.co.za;
    # Uncomment next line after SSL is in place:
    # return 301 https://$host$request_uri;

    # Django backend: /backend/* -> localhost:8001
    location /backend/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Portal SPA
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS – certbot will add or update this block when you run:
