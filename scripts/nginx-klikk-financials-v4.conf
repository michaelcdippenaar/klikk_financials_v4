# Nginx config for Klikk Financials v4 (HTTPS, Gunicorn on 8001)
#
# 1) Get SSL certificate (pick one):
#    Let's Encrypt (domain required):
#      sudo apt install certbot python3-certbot-nginx
#      sudo certbot --nginx -d your-domain.com
#    Or create self-signed (IP or testing):
#      sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout /etc/ssl/private/klikk-v4.key -out /etc/ssl/certs/klikk-v4.crt \
#        -subj "/CN=102.135.240.222"
#
# 2) Deploy and enable:
#    sudo cp scripts/nginx-klikk-financials-v4.conf /etc/nginx/sites-available/klikk-financials-v4
#    Edit server_name and ssl_certificate* paths if not using certbot.
#    sudo ln -sf /etc/nginx/sites-available/klikk-financials-v4 /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS – proxy to Gunicorn (WhiteNoise serves /static/)
server {
    listen 443 ssl;
    server_name _;

    # Let's Encrypt (certbot) – replace your-domain.com with your domain
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # Self-signed alternative:
    # ssl_certificate     /etc/ssl/certs/klikk-v4.crt;
    # ssl_certificate_key /etc/ssl/private/klikk-v4.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        send_timeout 1800s;
    }
}

