# Klikk – HTTPS routing
#
#  /              → Quasar portal     (Docker  127.0.0.1:8080)
#  /backend/      → Django API        (Docker  127.0.0.1:8001/)
#  /django-admin/ → Django admin      (Docker  127.0.0.1:8001/admin/)
#  /PAW/          → PAW               (other VM 192.168.1.37:8080)
#
# Deploy:
#   sudo cp scripts/nginx-klikk-financials-v4.conf /etc/nginx/sites-available/klikk-financials-v4
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name www.klikk.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.klikk.co.za;

    ssl_certificate     /etc/letsencrypt/live/www.klikk.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.klikk.co.za/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # ── PAW (other VM at 192.168.1.37) ──────────────────────────────────────
    location /PAW/ {
        proxy_pass http://192.168.1.37:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout    1800s;
        proxy_read_timeout    1800s;
    }
    location = /PAW { return 302 /PAW/; }

    # ── Django admin at /django-admin/ ──────────────────────────────────────
    # Strips /django-admin/ prefix → proxies to /admin/
    # proxy_redirect rewrites Location headers so admin redirects stay under /django-admin/
    location /django-admin/ {
        proxy_pass http://127.0.0.1:8001/admin/;
        proxy_redirect /admin/ /django-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /django-admin;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── Django API at /backend/ ─────────────────────────────────────────────
    # Strips /backend/ prefix → proxies to Django root /
    location /backend/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_redirect / /backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout    1800s;
        proxy_read_timeout    1800s;
        send_timeout          1800s;
    }

    # ── Quasar SPA portal (Docker on 8080) ──────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
