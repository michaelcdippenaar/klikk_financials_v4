# Nginx config for Klikk Financials v4 (Gunicorn on 8001)
# Copy to /etc/nginx/sites-available/ and enable:
#   sudo cp scripts/nginx-klikk-financials-v4.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/nginx-klikk-financials-v4.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Option A: Proxy everything to the app (WhiteNoise serves /static/)
#   Use this if you want a single place to manage static files (Django/WhiteNoise).
server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        send_timeout 1800s;
    }
}

