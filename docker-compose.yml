services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: klikk_business_intelligence.settings.staging
      # DB_HOST points to the host machine's Postgres (outside Docker).
      # host-gateway resolves to the Docker host IP automatically on Linux.
      DB_HOST: host-gateway
    extra_hosts:
      - "host-gateway:host-gateway"
    ports:
      - "8001:8001"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles

volumes:
  media_files:
  static_files:
